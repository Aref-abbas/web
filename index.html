<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GH Pages Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f4;
    }
    .card {
      background: #fff;
      padding: 2.5rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 480px;
    }
    h1 {
      margin-top: 0;
      color: #1a1a1a;
    }
    p {
      color: #555;
      line-height: 1.5;
    }
    .status {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.4rem 1rem;
      background: #e6f4ea;
      color: #1e7e34;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>GitHub Pages läuft 🎉</h1>
    <p>Wenn du diese Seite siehst, ist das Deployment erfolgreich eingerichtet.</p>
    <span class="status">Deployment erfolgreich</span>
  </div>
</body>
</html>
